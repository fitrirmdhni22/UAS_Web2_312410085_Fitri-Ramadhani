<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-Library | Rental Buku & Komik Digital</title>

<!-- TailwindCSS via CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          base: '#FFF8E7',
          ink: '#0A0A0A',
          yolk: '#FFD23F',
          punch: '#FF3D7F',
          volt: '#3D5AFE',
          mint: '#00D9A3',
          panel: '#FFFFFF',
        },
        fontFamily: {
          display: ['"Archivo Black"', 'sans-serif'],
          body: ['"Space Grotesk"', 'sans-serif'],
        },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<style>
  body {
    font-family: 'Space Grotesk', sans-serif;
    background-color: #FFF8E7;
  }
  [v-cloak] { display: none; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #0A0A0A; }
  ::-webkit-scrollbar-track { background: #FFF8E7; }
  .fade-enter-active, .fade-leave-active { transition: opacity 0.15s ease; }
  .fade-enter-from, .fade-leave-to { opacity: 0; }

  /* Signature neubrutalism: border tebal solid + hard offset shadow (no blur) */
  .brut {
    border: 3px solid #0A0A0A;
    box-shadow: 6px 6px 0 #0A0A0A;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .brut-sm {
    border: 3px solid #0A0A0A;
    box-shadow: 4px 4px 0 #0A0A0A;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .brut-press:hover { transform: translate(3px, 3px); box-shadow: 3px 3px 0 #0A0A0A; }
  .brut-press:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0 #0A0A0A; }
  .brut-press-sm:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #0A0A0A; }
  .brut-press-sm:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0 #0A0A0A; }
</style>
</head>
<body class="text-ink">

<div id="app" v-cloak></div>

<!-- ===================== CDN LIBRARIES ===================== -->
<!-- Vue 3 -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<!-- Vue Router 4 -->
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<!-- Axios -->
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<!-- SweetAlert2 (untuk modal konfirmasi & alert yang lebih cantik dari alert() biasa) -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- ===================== APP CONFIG ===================== -->
<script src="./js/config.js"></script>

<!-- ===================== AXIOS INTERCEPTORS ===================== -->
<script src="./js/axios-interceptor.js"></script>

<!-- ===================== COMPONENTS ===================== -->
<script src="./components/Navbar.js"></script>
<script src="./components/Home.js"></script>
<script src="./components/Login.js"></script>
<script src="./components/Register.js"></script>
<script src="./components/Dashboard.js"></script>
<script src="./components/Kategori.js"></script>
<script src="./components/Penulis.js"></script>
<script src="./components/Buku.js"></script>
<script src="./components/Anggota.js"></script>
<script src="./components/Peminjaman.js"></script>
<script src="./components/NotFound.js"></script>

<!-- ===================== ROUTER ===================== -->
<script src="./js/router.js"></script>

<!-- ===================== MAIN APP ===================== -->
<script src="./js/app.js"></script>

</body>
</html>
